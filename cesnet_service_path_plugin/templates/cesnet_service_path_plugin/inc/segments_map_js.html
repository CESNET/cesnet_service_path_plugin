{% load i18n %}
<script>
(function(cfg) {
    const map         = cfg.map;
    const segmentsData = cfg.segmentsData;
    const mapBounds   = cfg.mapBounds;
    const apiUrl      = cfg.apiUrl;

    // -------------------------------------------------------------------------
    // Color constants
    // -------------------------------------------------------------------------
    const statusColorsLine = {
        "Active": "#198754", "Planned": "#ff8c00", "Offline": "#dc3545",
        "Surveyed": "#3b82f6", "Decommissioned": "#6c757d"
    };
    const statusBadgeColors = {
        "Active": "success", "Planned": "primary", "Offline": "danger",
        "Decommissioned": "secondary", "Surveyed": "info"
    };
    const ownershipTypeBadgeColors = {
        "Owned": "success", "Leased": "primary", "Shared": "warning", "Foreign": "danger"
    };
    const segmentTypeColors = {
        "Dark Fiber": "#9c27b0", "Optical Spectrum": "#ff9800", "Ethernet Service": "#4caf50"
    };
    const ownershipTypeColorsLine = {
        "Owned": "#198754", "Leased": "#0d6efd", "Shared": "#fd7e14", "Foreign": "#dc3545"
    };
    const colorPalette = [
        '#d32f2f','#1976d2','#512da8','#f57c00','#7b1fa2','#c2185b','#303f9f',
        '#00796b','#455a64','#ff1744','#00bcd4','#e64a19','#5d4037','#3f51b5',
        '#9c27b0','#ff5722','#b71c1c','#0d47a1','#ad1457','#4a148c'
    ];

    // -------------------------------------------------------------------------
    // State
    // -------------------------------------------------------------------------
    const providerColors = {};
    let currentColorScheme = 'status';
    const pathLayers = L.layerGroup().addTo(map);
    const siteLayers = L.layerGroup().addTo(map);
    const segmentLayers = new Map();  // segmentId (string) -> layer

    // -------------------------------------------------------------------------
    // Color helpers
    // -------------------------------------------------------------------------
    function buildProviderColors() {
        const unique = [...new Set(segmentsData.map(s => s.provider).filter(p => p))];
        unique.forEach((p, i) => { providerColors[p] = colorPalette[i % colorPalette.length]; });
    }
    buildProviderColors();

    function getSegmentColor(segment) {
        if (currentColorScheme === 'status')         return statusColorsLine[segment.status]             || '#dc3545';
        if (currentColorScheme === 'provider')       return providerColors[segment.provider]             || '#6c757d';
        if (currentColorScheme === 'segment_type')   return segmentTypeColors[segment.segment_type]      || '#6c757d';
        if (currentColorScheme === 'ownership_type') return ownershipTypeColorsLine[segment.ownership_type] || '#6c757d';
        return '#dc3545';
    }

    // -------------------------------------------------------------------------
    // Legend
    // -------------------------------------------------------------------------
    function updateLegend() {
        const legend = document.getElementById(cfg.legendId);
        if (!legend) return;
        legend.innerHTML = '';
        const entries =
            currentColorScheme === 'status'         ? statusColorsLine :
            currentColorScheme === 'provider'       ? providerColors :
            currentColorScheme === 'segment_type'   ? segmentTypeColors :
            currentColorScheme === 'ownership_type' ? ownershipTypeColorsLine : {};

        Object.entries(entries).forEach(([label, color]) => {
            const li = document.createElement('li');
            li.innerHTML = `<span class="dropdown-item-text small">
                <span style="display:inline-block;width:20px;height:3px;background:${color};margin-right:8px;vertical-align:middle;"></span>${label}
            </span>`;
            legend.appendChild(li);
        });
        const divider = document.createElement('li');
        divider.innerHTML = '<hr class="dropdown-divider">';
        legend.appendChild(divider);
        const info = document.createElement('li');
        info.innerHTML = `<span class="dropdown-item-text small">
            <strong>{% trans "Solid line:" %}</strong> {% trans "Actual path data" %}<br>
            <strong>{% trans "Dashed line:" %}</strong> {% trans "No path data" %}
        </span>`;
        legend.appendChild(info);
    }

    // -------------------------------------------------------------------------
    // Color scheme switching
    // -------------------------------------------------------------------------
    const schemeLabels = {
        status:         '{% trans "Status" %}',
        provider:       '{% trans "Provider" %}',
        segment_type:   '{% trans "Segment Type" %}',
        ownership_type: '{% trans "Ownership Type" %}'
    };

    function switchColorScheme(scheme) {
        currentColorScheme = scheme;
        const el = document.getElementById(cfg.currentSchemeId);
        if (el) el.textContent = schemeLabels[scheme] || scheme;
        updateLegend();
        segmentLayers.forEach((layer, sid) => {
            const segment = segmentsData.find(s => s.id.toString() === sid);
            if (!segment) return;
            const color = getSegmentColor(segment);
            if (layer instanceof L.Polyline) {
                layer.setStyle({color});
            } else if (layer.eachLayer) {
                layer.eachLayer(sub => { if (sub.setStyle) sub.setStyle({color}); });
            }
        });
    }

    // -------------------------------------------------------------------------
    // Segment info panel
    // -------------------------------------------------------------------------
    function showSegmentInfo(segment) {
        const infoEl = document.getElementById(cfg.infoId);
        const contentEl = document.getElementById(cfg.infoContentId);
        if (!infoEl || !contentEl) return;
        const statusColor = statusBadgeColors[segment.status]             || 'secondary';
        const ownerColor  = ownershipTypeBadgeColors[segment.ownership_type] || 'secondary';
        const pathBadge   = segment.has_path_data
            ? '<span class="badge text-bg-success">{% trans "Has Path Data" %}</span>'
            : '<span class="badge text-bg-warning">{% trans "No Path Data" %}</span>';
        contentEl.innerHTML = `
            <div class="row">
                <div class="col-md-6">
                    <h4>${segment.name}</h4>
                    <p><strong>{% trans "Provider:" %}</strong> ${segment.provider || 'N/A'}</p>
                    <p><strong>{% trans "Status:" %}</strong> <span class="badge text-bg-${statusColor}">${segment.status}</span></p>
                    <p><strong>{% trans "Ownership:" %}</strong> <span class="badge text-bg-${ownerColor}">${segment.ownership_type}</span></p>
                    <p><strong>{% trans "Path Data:" %}</strong> ${pathBadge}</p>
                </div>
                <div class="col-md-6">
                    <p><strong>{% trans "Sites:" %}</strong> ${segment.site_a ? segment.site_a.name : 'N/A'} ↔ ${segment.site_b ? segment.site_b.name : 'N/A'}</p>
                    <p><strong>{% trans "Length:" %}</strong> ${segment.path_length_km ? segment.path_length_km + ' km' : '{% trans "Unknown" %}'}</p>
                    <div class="mt-2">
                        <a href="${segment.url}" class="btn btn-primary btn-sm">{% trans "View Details" %}</a>
                        <a href="${segment.map_url}" class="btn btn-outline-secondary btn-sm">{% trans "Individual Map" %}</a>
                    </div>
                </div>
            </div>`;
        infoEl.style.display = 'block';
    }

    // -------------------------------------------------------------------------
    // Overlap detection (screen-space)
    // -------------------------------------------------------------------------
    function distanceToSegmentScreen(p, a, b) {
        const ax = b.x - a.x, ay = b.y - a.y;
        const t  = Math.max(0, Math.min(1, ((p.x-a.x)*ax + (p.y-a.y)*ay) / (ax*ax + ay*ay || 1)));
        const dx = p.x - (a.x + t*ax), dy = p.y - (a.y + t*ay);
        return Math.sqrt(dx*dx + dy*dy);
    }

    function polylineNearPoint(polyline, screenPt, tol) {
        const lls  = polyline.getLatLngs();
        const flat = Array.isArray(lls[0]) ? lls.flat() : lls;
        for (let i = 0; i < flat.length - 1; i++) {
            const a = map.latLngToContainerPoint(flat[i]);
            const b = map.latLngToContainerPoint(flat[i+1]);
            if (distanceToSegmentScreen(screenPt, a, b) <= tol) return true;
        }
        return false;
    }

    function handleSegmentClick(e) {
        e.originalEvent.preventDefault();
        const screenPt = map.latLngToContainerPoint(e.latlng);
        const tol = 10;
        const nearby = [];
        segmentLayers.forEach((layer, sid) => {
            const seg = segmentsData.find(s => s.id.toString() === sid);
            if (!seg) return;
            let near = false;
            if (layer instanceof L.Polyline) near = polylineNearPoint(layer, screenPt, tol);
            else if (layer.eachLayer) layer.eachLayer(sub => {
                if (sub instanceof L.Polyline) near = near || polylineNearPoint(sub, screenPt, tol);
            });
            if (near) nearby.push({layer, segment: seg});
        });
        if (nearby.length === 0) return;
        showSegmentInfo(nearby[0].segment);
        if (nearby.length === 1) {
            showSinglePopup(nearby[0].segment, e.latlng);
        } else {
            showOverlapPopup(nearby, e.latlng);
        }
    }

    function showSinglePopup(seg, latlng) {
        const sc = statusBadgeColors[seg.status] || 'secondary';
        L.popup({maxWidth: 300})
            .setLatLng(latlng)
            .setContent(`<strong>${seg.name}</strong><br>
                <strong>{% trans "Status:" %}</strong> <span class="badge text-bg-${sc}">${seg.status}</span><br>
                <strong>{% trans "Route:" %}</strong> ${seg.site_a ? seg.site_a.name : 'N/A'} ↔ ${seg.site_b ? seg.site_b.name : 'N/A'}<br>
                <small class="text-muted">{% trans "See details below ↓" %}</small>`)
            .openOn(map);
    }

    function showOverlapPopup(overlaps, latlng) {
        let html = `<div><h6><i class="mdi mdi-layers"></i> {% trans "Multiple Segments" %} (${overlaps.length})</h6>`;
        overlaps.forEach(({segment: seg}) => {
            const sc = statusBadgeColors[seg.status] || 'secondary';
            html += `<div class="border-bottom pb-1 mb-1">
                <strong>${seg.name}</strong><br>
                <span class="badge text-bg-${sc}">${seg.status}</span>
                ${seg.site_a ? seg.site_a.name : ''} ↔ ${seg.site_b ? seg.site_b.name : ''}
            </div>`;
        });
        html += '</div>';
        L.popup({maxWidth: 350}).setLatLng(latlng).setContent(html).openOn(map);
    }

    // -------------------------------------------------------------------------
    // Load segments
    // -------------------------------------------------------------------------
    function loadSegments() {
        pathLayers.clearLayers();
        siteLayers.clearLayers();
        segmentLayers.clear();

        segmentsData.forEach(segment => {
            const color = getSegmentColor(segment);

            if (segment.site_a) {
                L.circleMarker([segment.site_a.lat, segment.site_a.lng],
                    {radius:6, fillColor:'#007bff', color:'#fff', weight:2, opacity:1, fillOpacity:0.8})
                    .bindPopup(`<strong>Site A:</strong> ${segment.site_a.name}<br><strong>{% trans "Segment:" %}</strong> ${segment.name}`)
                    .addTo(siteLayers);
            }
            if (segment.site_b) {
                L.circleMarker([segment.site_b.lat, segment.site_b.lng],
                    {radius:6, fillColor:'#28a745', color:'#fff', weight:2, opacity:1, fillOpacity:0.8})
                    .bindPopup(`<strong>Site B:</strong> ${segment.site_b.name}<br><strong>{% trans "Segment:" %}</strong> ${segment.name}`)
                    .addTo(siteLayers);
            }
            if (!segment.has_path_data && segment.site_a && segment.site_b) {
                const line = L.polyline(
                    [[segment.site_a.lat, segment.site_a.lng], [segment.site_b.lat, segment.site_b.lng]],
                    {color, weight:3, opacity:0.7, dashArray:'5, 10'}
                );
                line.on('click', handleSegmentClick);
                pathLayers.addLayer(line);
                segmentLayers.set(segment.id.toString(), line);
            }
        });

        const fetchUrl = cfg.appendLocationSearch
            ? apiUrl + new URL(window.location.href).search
            : apiUrl;

        fetch(fetchUrl)
            .then(r => r.json())
            .then(data => {
                if (data.features) {
                    data.features.forEach(feature => {
                        if (feature.properties.type === 'path') {
                            const seg   = segmentsData.find(s => s.id === feature.properties.id);
                            const color = seg ? getSegmentColor(seg) : '#dc3545';
                            const layer = L.geoJSON(feature, {style: {color, weight:4, opacity:0.8}});
                            layer.on('click', handleSegmentClick);
                            pathLayers.addLayer(layer);
                            segmentLayers.set(feature.properties.id.toString(), layer);
                        }
                    });
                }
                setTimeout(fitMap, 100);
            })
            .catch(() => setTimeout(fitMap, 100));
    }

    // -------------------------------------------------------------------------
    // Fit bounds
    // -------------------------------------------------------------------------
    function fitMap() {
        if (mapBounds.minLat !== null && mapBounds.maxLat !== null) {
            map.fitBounds(
                [[mapBounds.minLat, mapBounds.minLng], [mapBounds.maxLat, mapBounds.maxLng]],
                {padding: [20, 20]}
            );
        }
    }

    // -------------------------------------------------------------------------
    // Wire up controls
    // -------------------------------------------------------------------------
    const fitBtn = document.getElementById(cfg.fitBoundsId);
    if (fitBtn) fitBtn.addEventListener('click', fitMap);

    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('[data-scheme][data-map="' + cfg.mapId + '"]').forEach(el => {
            el.addEventListener('click', function(e) {
                e.preventDefault();
                switchColorScheme(this.getAttribute('data-scheme'));
            });
        });
    });

    // Expose for global callers (segments_map.html uses window.hideSegmentInfo etc.)
    cfg.hideSegmentInfo = function() {
        const el = document.getElementById(cfg.infoId);
        if (el) el.style.display = 'none';
    };
    cfg.selectOverlappingSegment = function(segmentId) {
        const seg = segmentsData.find(s => s.id.toString() === segmentId.toString());
        if (seg) showSegmentInfo(seg);
    };

    initializeLayerSwitching(map);
    updateLegend();
    loadSegments();

})(segmentsMapConfig);
</script>
